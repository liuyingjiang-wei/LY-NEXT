server:
  host: "0.0.0.0"
  port: 8000
  reload: false
  log_level: "info"

cors:
  origins:
    - "http://localhost:8000"
    - "http://127.0.0.1:8000"

api:
  auto_load: false
  api_dir: "ly_next/apis"
  security_profile: "production"
  trusted_module_hashes: {}

plugins:
  enabled: true
  dir: "plugins"
  # 额外扫描目录（相对项目根）；clone 的插件可放在 plugins/local/<name>/
  extra_dirs:
    - plugins/local
  modules: []
  entry_points: true
  # development = scan plugins/ + extra_dirs（plugins/local）；production 仅 plugins.modules
  security_profile: "development"
  trusted_module_hashes: {}

llm:
  default_provider: "openai"
  default_model: "openai"
  request_timeout: 120
  agent_request_timeout: 300
  models:
    - name: openai
      format: openai
      model: "gpt-5.5"
      api_key: "${OPENAI_API_KEY}"
      base_url: ""
    - name: anthropic
      format: anthropic
      model: "claude-opus-4-8"
      api_key: "${ANTHROPIC_API_KEY}"
      base_url: ""
    - name: ollama
      format: ollama
      model: "qwen2.5"
      api_key: "not-needed"
      base_url: "http://localhost:11434"
    - name: openai_compat
      format: openai_compat
      model: "qwen2.5"
      api_key: "not-needed"
      base_url: "http://localhost:8000/v1"
      auth_mode: "bearer"
      model_aliases: {}

openai_llm:
  model: "gpt-4o-mini"
  api_key: "${OPENAI_API_KEY}"
  base_url: ""

anthropic_llm:
  model: "claude-3-5-haiku-20241022"
  api_key: "${ANTHROPIC_API_KEY}"
  base_url: ""

ollama_llm:
  model: "qwen2.5"
  base_url: "http://localhost:11434"

openai_compat_llm:
  model: "qwen2.5"
  api_key: "not-needed"
  base_url: "http://localhost:8000/v1"
  auth_mode: "bearer"
  model_aliases: {}

rag_embedding_llm:
  model: "text-embedding-3-small"
  api_key: "${OPENAI_API_KEY}"
  base_url: ""
  auth_mode: "bearer"

rag_rerank_llm:
  provider: cohere
  model: "rerank-v3.5"
  api_key: "${COHERE_API_KEY:-}"
  base_url: ""
  auth_mode: "bearer"

agent:
  enabled: true
  max_steps: 6
  max_tools: 40
  verbose: false
  reasoning_mode: "react"
  native_tool_calls: true
  tool_call_mode: "auto"
  prefer_compat_when_mcp_tools: false
  eager_tool_dispatch: true
  parallel_tool_calls: true
  stream_output: true
  tool_schema:
    compact_native: true
    max_description_chars: 280
  chat_pipeline:
    parallel_prep: true
    persist_user_async: true
    skip_augment_on_tool_intent: true
    skip_memory_on_tool_intent: true
    skip_rag_on_react: true
    middleware: []
  memory:
    enabled: true
    path: "MEMORY.md"
    max_chars: 8000
    write:
      enabled: true
      min_note_chars: 2
      max_note_chars: 2000
      max_appends_per_minute: 24
      dedupe: true
  tool_policy:
    max_tier: network
    deny_tools:
      - web_scrape
    semantic_select: true
    semantic_method: hybrid
    semantic_top_k: 12
    semantic_min_score: 0.32
    semantic_relative_factor: 0.92
    semantic_min_pool: 8
    semantic_fallback: pins_only
    pin_tools:
      - list_tools
      - describe_tool
    allow_categories: null
    allow_tools: null
  channel_tools:
    web:
      allow_file_write: true
    qq:
      allow_file_write: false
    telegram:
      allow_file_write: false
  scratchpad:
    max_chars: 12000
    compress_enabled: true
    compress_target_chars: 4500
    compress_max_tokens: 768
    compress_prompt_chars: 14000
    compress_use_llm: true
  loop_guard:
    max_repeat_same_tool: 3
    max_consecutive_tool_failures: 4
  tool_spill:
    enabled: true
    max_inline_chars: 32000
    preview_head_chars: 2000
    preview_tail_chars: 500
    relative_dir: "tool_results"
  output_token_budget:
    enabled: true
    max_completion_tokens_per_run: 500000
    length_continuation_max: 2
  context_window:
    default_tokens: 128000
    per_model: {}
    prune_enabled: true
    prune_dialog_fill_ratio: 0.82
    reserve_completion_tokens: 2048
    prune_min_tool_chars: 400
    prune_protect_recent_turns: 3
    prune_tool_summarize: true
    prune_tool_head_chars: 900
    prune_tool_tail_chars: 500
    tool_placeholder: "[Earlier tool output removed to fit context window.]"
  skills:
    enabled: true
    dirs:
      - ".agents/skills"
      - "skills"
    inject_summary: true
    max_summary_skills: 24
    max_read_chars: 32000
    cache_ttl_seconds: 30
  error_recovery:
    enabled: true
    max_retries: 2
    backoff_base_seconds: 0.8
    retry_status_codes: [429, 502, 503, 504]
  persistence:
    enabled: true
    max_messages_per_thread: 200
    checkpoint:
      enabled: true
      backend: postgres   # postgres | memory
      write_every: final_only   # final_only | iteration | disabled
  react_engine: native   # native | langgraph_native
  observability:
    enabled: true
    persist: true
    ws_run_summary: true
    max_events_per_run: 500
    store_prompts: false
  workbench:
    translate:
      mode: chat
      prompt: |
        你是一名专业翻译。请将以下文本翻译为 {target_language}。
        保留 Markdown 格式、代码块与行内代码；只输出译文，不要解释、不要加标题。

        原文：
        {text}
      languages:
        - id: en
          label: English
          flag: "🇺🇸"
          target: English
        - id: zh-CN
          label: 简体中文
          flag: "🇨🇳"
          target: 简体中文
        - id: zh-TW
          label: 繁体中文
          flag: "🇹🇼"
          target: 繁体中文
        - id: ja
          label: 日语
          flag: "🇯🇵"
          target: 日语
        - id: ko
          label: 韩语
          flag: "🇰🇷"
          target: 韩语
        - id: fr
          label: 法语
          flag: "🇫🇷"
          target: 法语
        - id: de
          label: 德语
          flag: "🇩🇪"
          target: 德语
        - id: it
          label: 意大利语
          flag: "🇮🇹"
          target: 意大利语
  prompts:
    enabled: true
    prompts_dir: "prompts"
    native_system_file: "native_system.md"
    compat_react_preamble_file: "compat_react_preamble.md"
    plan_decision_preamble_file: "plan_decision_preamble.md"
    tool_manifest_file: "tool_manifest_suffix.md"
  coordinator:
    max_agents: 3
    max_steps_per_delegate: 5
    decompose_max_tokens: 768
    decompose_retries: 1
    parallel_delegates: true
    max_parallel_delegates: 4
    handoff_max_chars: 7000
    compress_handoff: false
    handoff_compress_max_tokens: 384
    synthesize_max_tokens: 2048
    synthesize_body_max_chars: 24000
  vision_precaption:
    enabled: false
    model_name: ""
    instruction: ""
    prefix: "【图像识别】\n"
    temperature: 0.3
    max_tokens: 1024
    max_caption_chars: 16000
    max_merged_chars: 48000
  context:
    enabled: true
    examples_path: ""
    top_k: 3
    min_similarity: 0.15
    use_embeddings: true
  rag:
    enabled: true
    mode: both
    documents_path: "data/ly_next/knowledge"
    chunk_strategy: markdown
    top_k: 5
    chunk_size: 512
    chunk_overlap: 64
    min_similarity: 0.20
    use_embeddings: true
    hybrid_enabled: true
    rrf_k: 60
    mmr_enabled: true
    mmr_lambda: 0.6
    retrieve_multiplier: 5
    query_cache_ttl_seconds: 90
    retrieval_timeout_seconds: 45
    contextual_chunks: true
    query_rewrite:
      enabled: true
      adaptive: true
      max_variants: 4
      weak_score_threshold: 0.35
      include_keywords: true
      include_identifiers: true
    show_source: true
    embedding:
      model: "text-embedding-3-small"
      config_ref: "rag_embedding_llm"
      base_url: ""
    rerank:
      enabled: false
      provider: cohere
      model: "rerank-v3.5"
      config_ref: "rag_rerank_llm"
      top_n: 50

tools:
  plugin_dir: ""
  security_profile: "production"
  host:
    enabled: false
    roots:
      - "~"
    deny_paths: []
    max_read_bytes: 2097152
    max_write_bytes: 4194304
    max_list_entries: 500
    exec:
      enabled: true
      default_cwd: "~"
      timeout_seconds: 300
      max_output_chars: 120000
      minimal_env: true
      hard_block_patterns: []
    approvals:
      enabled: true
      ttl_seconds: 600
      mode: destructive
      require_for_delete: true
      require_for_recursive_delete: true
      exec_patterns: []
  built_in:
    - "list_tools"
    - "describe_tool"
    - "calculator"
    - "format_json"
    - "json_query"
    - "text_process"
    - "regex_extract"
    - "get_current_time"
    - "url_parse"
    - "http_fetch"
    - "web_fetch"
    - "remember_fact"
    - "knowledge_search"
    - "list_skills"
    - "read_skill"
    - "web_search"
  web_search:
    provider: "duckduckgo"
    fallback_providers: []
    api_key: ""
    default_num_results: 5
    cache_ttl_minutes: 15
    search_depth: "basic"
    allowed_domains: []
    blocked_domains: []
  web_fetch:
    provider: "jina"
    api_key: ""
    jina_proxy: ""
    base_url: ""
    extract_depth: "basic"
    output_format: "txt"
    favor_recall: true
    include_tables: true
    timeout_seconds: 30
    default_max_length: 8000
    max_response_bytes: 2000000
    user_agent: ""
  mcp:
    enabled: true
    transport: "sse"
    path: "/mcp"
    langgraph_tool_name_prefix: true
    search_dedup:
      strategy: "prefer_builtin"
    vendor_adapt_probe: false
    remote:
      enabled: false
      mcpServers: []

database:
  host: "${DATABASE_HOST:-localhost}"
  port: 5432
  username: "postgres"
  password: "${POSTGRES_PASSWORD}"
  database: "ly_next"
  try_unix_socket: true
  pool_size: 10
  max_overflow: 20
  sql_echo: false

redis:
  host: "${REDIS_HOST:-localhost}"
  port: 6379
  password: "${REDIS_PASSWORD}"
  db: 0
  cache_ttl: 3600

services:
  stop_managed_on_exit: true

logging:
  level: "info"
  file: "logs/app.log"
  structured_file: true
  max_bytes: 10485760
  backup_count: 5

security:
  audit:
    enabled: true
    file: "logs/security_audit.log"
    log_tool_calls: true
    log_auth_events: true
  headers:
    enabled: true
    hsts: true
    hsts_max_age: 31536000
    hsts_include_subdomains: false
    frame_options: "DENY"
    content_type_options: true
    referrer_policy: "strict-origin-when-cross-origin"
    content_security_policy: "default"
  rate_limit:
    enabled: false
  agent_policy:
    enabled: true
    block_sensitive_tools_when_untrusted: true
    block_mutating_http_when_untrusted: true
    untrusted_channels:
      - "qq"
      - "telegram"
    untrusted_tools:
      - "web_fetch"
      - "web_search"
      - "web_scrape"
      - "http_fetch"
    sensitive_tools:
      - "host_read_file"
      - "host_write_file"
      - "host_delete_path"
      - "host_list_dir"
      - "host_run_command"
      - "host_search"

auth:
  enabled: true
  mode: "api_key"
  api_key: "${LY_NEXT_API_KEY}"
  header_name: "X-API-Key"
  cookie_name: "ly_api_key"
  allow_api_key_in_query: false
  cookie_secure: false
  jwt:
    enabled: false
    secret: "${LY_NEXT_JWT_SECRET}"
    algorithm: "HS256"
    access_ttl_minutes: 60
    issuer: "ly-next"
    cookie_name: "ly_session"
  users: []
  whitelist:
    - "/api/health"
    - "/api/info"
    - "/api/auth/login"
    - "/api/auth/config"
    - "/ly/login"
    - "/ly/static/*"

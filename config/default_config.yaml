server:
  host: "127.0.0.1"
  port: 8000
  reload: false
  log_level: "debug"

cors:
  origins:
    - "*"

api:
  auto_load: true
  api_dir: "ly_next/apis"
  # development = 加载 api_dir 下模块；production = 永不从目录加载；verified = 仅加载 trusted_module_hashes 且哈希匹配
  security_profile: "development"
  trusted_module_hashes: {}

llm:
  default_provider: "openai"
  request_timeout: 60

openai_llm:
  model: "gpt-4o-mini"
  api_key: "${OPENAI_API_KEY}"
  base_url: ""

anthropic_llm:
  model: "claude-3-5-haiku-20241022"
  api_key: "${ANTHROPIC_API_KEY}"
  base_url: ""

ollama_llm:
  model: "qwen2.5"
  base_url: "http://localhost:11434"

openai_compat_llm:
  model: "qwen2.5"
  api_key: "not-needed"
  base_url: "http://localhost:8000/v1"
  auth_mode: "bearer"
  # 出站 /chat/completions 前将请求的 model 映射为网关真实 ID（任意供应商；合并保存配置时保留）
  model_aliases: {}

rag_embedding_llm:
  model: "text-embedding-3-small"
  api_key: "${OPENAI_API_KEY}"
  base_url: ""
  auth_mode: "bearer"

agent:
  enabled: true
  max_steps: 6
  max_tools: 40
  verbose: false
  reasoning_mode: "react"
  native_tool_calls: true
  tool_call_mode: "auto"  # auto | native | compat
  prefer_compat_when_mcp_tools: true
  stream_output: true
  memory:
    enabled: true
    path: "MEMORY.md"
  tool_policy:
    max_tier: network
    # null = 不按类别白名单；非空列表则仅暴露这些 category（如 safe, general, network, mcp）
    allow_categories: null
    # 与 MCP 工具重名或想关掉内置项时写工具名（须与注册名一致，含 MCP 前缀时按实际名）
    deny_tools: []
    allow_tools: null
  scratchpad:
    max_chars: 12000
    compress_enabled: true
    compress_target_chars: 4500
    compress_max_tokens: 768
    compress_prompt_chars: 14000
    compress_use_llm: true
  loop_guard:
    max_repeat_same_tool: 3
    max_consecutive_tool_failures: 4
  tool_spill:
    enabled: true
    max_inline_chars: 32000
    preview_head_chars: 2000
    preview_tail_chars: 500
    relative_dir: "tool_results"
  output_token_budget:
    enabled: true
    max_completion_tokens_per_run: 500000
    length_continuation_max: 2
  context_window:
    default_tokens: 128000
    per_model: {}
    prune_enabled: true
    prune_dialog_fill_ratio: 0.82
    reserve_completion_tokens: 2048
    prune_min_tool_chars: 400
    tool_placeholder: "[Earlier tool output removed to fit context window.]"
  stdin_journal:
    enabled: true
    relative_path: "logs/stdin_journal.jsonl"
  coordinator:
    max_agents: 3
    max_steps_per_delegate: 5
    decompose_max_tokens: 768
    decompose_retries: 1
    parallel_delegates: true
    max_parallel_delegates: 4
    handoff_max_chars: 7000
    compress_handoff: false
    handoff_compress_max_tokens: 384
    synthesize_max_tokens: 2048
    synthesize_body_max_chars: 24000
  model_router:
    enabled: false
    mode: "hybrid"
    match_scope: "last_user"
    match_recent_chars: 8000
    match_rules: []
    classifier:
      provider: "openai_compat"
      model: ""
      temperature: 0.1
      max_tokens: 128
    routes:
      reasoning:
        provider: "openai"
        model: "gpt-4o"
      code:
        provider: "openai"
        model: "gpt-4o"
      vision:
        provider: "openai"
        model: "gpt-4o"
      tools:
        provider: "openai"
        model: "gpt-4o"
      chat:
        provider: "openai"
        model: "gpt-4o-mini"
  # 识图预描述：先用多模态模型把图片转成文字，主对话再走全局/路由 LLM（适合识图模型弱、主模型强）
  vision_precaption:
    enabled: false
    use_router_vision_model: false
    provider: "openai"
    model: ""
    instruction: ""
    prefix: "【图像识别】\n"
    temperature: 0.3
    max_tokens: 1024
    max_caption_chars: 16000
    max_merged_chars: 48000
  context:
    enabled: true
    examples_path: ""
    top_k: 3
    min_similarity: 0.15
    use_embeddings: true
  rag:
    enabled: false
    documents_path: ""
    top_k: 5
    chunk_size: 900
    chunk_overlap: 120
    min_similarity: 0.12
    use_embeddings: true
    hybrid_enabled: true
    rrf_k: 60
    mmr_enabled: false
    mmr_lambda: 0.55
    retrieve_multiplier: 3
    show_source: true
    embedding:
      model: "text-embedding-3-small"
      config_ref: "rag_embedding_llm"
    vector_store:
      enabled: true
      backend: "lancedb"
      uri: "data/ly_next/lancedb"
      table: "rag_chunks"

tools:
  # null = 注册全部内置；[] = 不注册任何内置；列表 = 仅注册这些名字
  built_in:
    - "calculator"
    - "format_json"
    - "text_process"
    - "regex_extract"
    - "get_current_time"
    - "url_parse"
    - "http_fetch"
    - "web_search"
    - "web_scrape"
  web_search:
    provider: "duckduckgo"
    api_key: ""
  mcp:
    enabled: true
    transport: "sse"
    path: "/mcp"
    langgraph_tool_name_prefix: true
    remote:
      enabled: false
      mcpServers: []

database:
  host: "${DATABASE_HOST:-localhost}"
  port: 5432
  username: "postgres"
  password: "${POSTGRES_PASSWORD}"
  database: "ly_next"
  try_unix_socket: true
  pool_size: 10
  max_overflow: 20
  sql_echo: false

redis:
  host: "${REDIS_HOST:-localhost}"
  port: 6379
  password: "${REDIS_PASSWORD}"
  db: 0
  cache_ttl: 3600

services:
  stop_managed_on_exit: true

logging:
  level: "info"
  file: "logs/app.log"
  max_bytes: 10485760
  backup_count: 5

auth:
  enabled: true
  api_key: "${LY_NEXT_API_KEY}"
  header_name: "X-API-Key"
  cookie_name: "ly_api_key"
  allow_api_key_in_query: false
  cookie_secure: false
  whitelist:
    - "/docs"
    - "/openapi.json"
    - "/redoc"
    - "/api/health"
    - "/api/info"
    - "/ly/login"
    - "/ly/static/*"

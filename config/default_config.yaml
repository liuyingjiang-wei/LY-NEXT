server:
  host: "0.0.0.0"
  port: 8000
  reload: false
  log_level: "info"

cors:
  origins:
    - "*"

api:
  auto_load: true
  api_dir: "ly_next/apis"
  security_profile: "development"
  trusted_module_hashes: {}

plugins:
  enabled: true
  dir: "plugins"
  modules: []
  entry_points: true
  security_profile: "development"
  trusted_module_hashes: {}

llm:
  default_provider: "openai"
  request_timeout: 60

openai_llm:
  model: "gpt-4o-mini"
  api_key: "${OPENAI_API_KEY}"
  base_url: ""

anthropic_llm:
  model: "claude-3-5-haiku-20241022"
  api_key: "${ANTHROPIC_API_KEY}"
  base_url: ""

ollama_llm:
  model: "qwen2.5"
  base_url: "http://localhost:11434"

openai_compat_llm:
  model: "qwen2.5"
  api_key: "not-needed"
  base_url: "http://localhost:8000/v1"
  auth_mode: "bearer"
  model_aliases: {}

rag_embedding_llm:
  model: "text-embedding-3-small"
  api_key: "${OPENAI_API_KEY}"
  base_url: ""
  auth_mode: "bearer"

agent:
  enabled: true
  max_steps: 6
  max_tools: 40
  verbose: false
  reasoning_mode: "react"
  native_tool_calls: true
  tool_call_mode: "auto"
  prefer_compat_when_mcp_tools: true
  stream_output: true
  chat_pipeline:
    parallel_prep: true
    persist_user_async: true
    middleware: []
  memory:
    enabled: true
    path: "MEMORY.md"
    max_chars: 8000
    write:
      enabled: true
      min_note_chars: 2
      max_note_chars: 2000
      max_appends_per_minute: 24
      dedupe: true
  tool_policy:
    max_tier: network
    allow_categories: null
    deny_tools: []
    allow_tools: null
  scratchpad:
    max_chars: 12000
    compress_enabled: true
    compress_target_chars: 4500
    compress_max_tokens: 768
    compress_prompt_chars: 14000
    compress_use_llm: true
  loop_guard:
    max_repeat_same_tool: 3
    max_consecutive_tool_failures: 4
  tool_spill:
    enabled: true
    max_inline_chars: 32000
    preview_head_chars: 2000
    preview_tail_chars: 500
    relative_dir: "tool_results"
  output_token_budget:
    enabled: true
    max_completion_tokens_per_run: 500000
    length_continuation_max: 2
  context_window:
    default_tokens: 128000
    per_model: {}
    prune_enabled: true
    prune_dialog_fill_ratio: 0.82
    reserve_completion_tokens: 2048
    prune_min_tool_chars: 400
    tool_placeholder: "[Earlier tool output removed to fit context window.]"
  error_recovery:
    enabled: true
    max_retries: 2
    backoff_base_seconds: 0.8
    retry_status_codes: [429, 502, 503, 504]
  persistence:
    enabled: true
    max_messages_per_thread: 200
    checkpoint:
      enabled: true
      backend: postgres   # postgres | memory
  observability:
    enabled: true
    persist: true
    ws_run_summary: true
    max_events_per_run: 500
    store_prompts: false
  workbench:
    translate:
      mode: chat
      prompt: |
        你是一名专业翻译。请将以下文本翻译为 {target_language}。
        保留 Markdown 格式、代码块与行内代码；只输出译文，不要解释、不要加标题。

        原文：
        {text}
      languages:
        - id: en
          label: English
          flag: "🇺🇸"
          target: English
        - id: zh-CN
          label: 简体中文
          flag: "🇨🇳"
          target: 简体中文
        - id: zh-TW
          label: 繁体中文
          flag: "🇹🇼"
          target: 繁体中文
        - id: ja
          label: 日语
          flag: "🇯🇵"
          target: 日语
        - id: ko
          label: 韩语
          flag: "🇰🇷"
          target: 韩语
        - id: fr
          label: 法语
          flag: "🇫🇷"
          target: 法语
        - id: de
          label: 德语
          flag: "🇩🇪"
          target: 德语
        - id: it
          label: 意大利语
          flag: "🇮🇹"
          target: 意大利语
  prompts:
    enabled: true
    prompts_dir: "prompts"
    native_system_file: "native_system.md"
    compat_react_preamble_file: "compat_react_preamble.md"
    plan_decision_preamble_file: "plan_decision_preamble.md"
    tool_manifest_file: "tool_manifest_suffix.md"
  coordinator:
    max_agents: 3
    max_steps_per_delegate: 5
    decompose_max_tokens: 768
    decompose_retries: 1
    parallel_delegates: true
    max_parallel_delegates: 4
    handoff_max_chars: 7000
    compress_handoff: false
    handoff_compress_max_tokens: 384
    synthesize_max_tokens: 2048
    synthesize_body_max_chars: 24000
  model_router:
    enabled: false
    mode: "hybrid"
    match_scope: "last_user"
    match_recent_chars: 8000
    match_rules: []
    classifier:
      provider: "openai_compat"
      model: ""
      temperature: 0.1
      max_tokens: 128
    routes:
      reasoning:
        provider: "openai"
        model: "gpt-4o"
      code:
        provider: "openai"
        model: "gpt-4o"
      vision:
        provider: "openai"
        model: "gpt-4o"
      tools:
        provider: "openai"
        model: "gpt-4o"
      chat:
        provider: "openai"
        model: "gpt-4o-mini"
  vision_precaption:
    enabled: false
    use_router_vision_model: false
    provider: "openai"
    model: ""
    instruction: ""
    prefix: "【图像识别】\n"
    temperature: 0.3
    max_tokens: 1024
    max_caption_chars: 16000
    max_merged_chars: 48000
  context:
    enabled: true
    examples_path: ""
    top_k: 3
    min_similarity: 0.15
    use_embeddings: true
  rag:
    enabled: true
    documents_path: "data/ly_next/knowledge"
    top_k: 5
    chunk_size: 900
    chunk_overlap: 120
    min_similarity: 0.12
    use_embeddings: true
    hybrid_enabled: true
    rrf_k: 60
    mmr_enabled: false
    mmr_lambda: 0.55
    retrieve_multiplier: 3
    show_source: true
    embedding:
      model: "text-embedding-3-small"
      config_ref: "rag_embedding_llm"

tools:
  plugin_dir: ""
  security_profile: "development"
  built_in:
    - "calculator"
    - "format_json"
    - "text_process"
    - "regex_extract"
    - "get_current_time"
    - "url_parse"
    - "http_fetch"
    - "web_fetch"
    - "remember_fact"
    - "web_search"
    - "web_scrape"
  web_search:
    provider: "duckduckgo"
    api_key: ""
  web_fetch:
    provider: "jina"
    api_key: ""
    jina_proxy: ""
    base_url: ""
    extract_depth: "basic"
    output_format: "txt"
    favor_recall: true
    include_tables: true
    timeout_seconds: 30
    default_max_length: 8000
    max_response_bytes: 2000000
    user_agent: ""
  mcp:
    enabled: true
    transport: "sse"
    path: "/mcp"
    langgraph_tool_name_prefix: true
    remote:
      enabled: false
      mcpServers: []

database:
  host: "${DATABASE_HOST:-localhost}"
  port: 5432
  username: "postgres"
  password: "${POSTGRES_PASSWORD}"
  database: "ly_next"
  try_unix_socket: true
  pool_size: 10
  max_overflow: 20
  sql_echo: false

redis:
  host: "${REDIS_HOST:-localhost}"
  port: 6379
  password: "${REDIS_PASSWORD}"
  db: 0
  cache_ttl: 3600

services:
  stop_managed_on_exit: true

logging:
  level: "info"
  file: "logs/app.log"
  structured_file: true
  max_bytes: 10485760
  backup_count: 5

auth:
  enabled: true
  api_key: "${LY_NEXT_API_KEY}"
  header_name: "X-API-Key"
  cookie_name: "ly_api_key"
  allow_api_key_in_query: false
  cookie_secure: false
  whitelist:
    - "/docs"
    - "/openapi.json"
    - "/redoc"
    - "/api/health"
    - "/api/info"
    - "/ly/login"
    - "/ly/static/*"

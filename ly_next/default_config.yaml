server:
  host: "0.0.0.0"
  port: 8000
  reload: false
  log_level: "info"

cors:
  origins:
    - "*"

api:
  auto_load: true
  api_dir: "ly_next/apis"
  security_profile: "development"
  trusted_module_hashes: {}

llm:
  default_provider: "openai"
  default_model: "openai"
  request_timeout: 120
  agent_request_timeout: 300
  models:
    - name: openai
      format: openai
      model: "gpt-4o-mini"
      api_key: "${OPENAI_API_KEY}"
      base_url: ""
    - name: anthropic
      format: anthropic
      model: "claude-3-5-haiku-20241022"
      api_key: "${ANTHROPIC_API_KEY}"
      base_url: ""
    - name: ollama
      format: ollama
      model: "qwen2.5"
      api_key: "not-needed"
      base_url: "http://localhost:11434"
    - name: openai_compat
      format: openai_compat
      model: "qwen2.5"
      api_key: "not-needed"
      base_url: "http://localhost:8000/v1"
      auth_mode: "bearer"
      model_aliases: {}

rag_embedding_llm:
  model: "text-embedding-3-small"
  api_key: "${OPENAI_API_KEY}"
  base_url: ""
  auth_mode: "bearer"

agent:
  enabled: true
  max_steps: 6
  max_tools: 40
  verbose: false
  reasoning_mode: "react"
  native_tool_calls: true
  tool_call_mode: "auto"
  prefer_compat_when_mcp_tools: true
  stream_output: true
  stream_tokens: true
  chat_pipeline:
    parallel_prep: true
    overlap_augment: true
    persist_user_async: true
    auto_skip_tool_intents: true
    auto_direct_chat_mode: true
    auto_skip_memory_on_fast_path: true
    skip_augment_on_fast_path: true
  prompt_augment:
    min_query_chars: 12
    skip_greetings: true
    skip_tool_intents: true
    auto_direct_chat: true
    auto_skip_skills_on_fast_path: true
    fast_chat_max_chars: 120
  memory:
    enabled: true
    path: "MEMORY.md"
    max_chars: 8000
    write:
      enabled: true
      min_note_chars: 2
      max_note_chars: 2000
      max_appends_per_minute: 24
      dedupe: true
  tool_policy:
    max_tier: network
    allow_categories: null
    deny_tools: []
    allow_tools: null
  channel_tools:
    web:
      allow_file_write: true
    qq:
      allow_file_write: false
    telegram:
      allow_file_write: false
  scratchpad:
    max_chars: 12000
    compress_enabled: true
    compress_target_chars: 4500
    compress_max_tokens: 768
    compress_prompt_chars: 14000
    compress_use_llm: true
  loop_guard:
    max_repeat_same_tool: 3
    max_consecutive_tool_failures: 4
  tool_spill:
    enabled: true
    max_inline_chars: 32000
    preview_head_chars: 2000
    preview_tail_chars: 500
    relative_dir: "tool_results"
  output_token_budget:
    enabled: true
    max_completion_tokens_per_run: 500000
    length_continuation_max: 2
  context_window:
    default_tokens: 128000
    per_model: {}
    prune_enabled: true
    prune_dialog_fill_ratio: 0.82
    reserve_completion_tokens: 2048
    prune_min_tool_chars: 400
    prune_protect_recent_turns: 3
    prune_tool_summarize: true
    prune_tool_head_chars: 900
    prune_tool_tail_chars: 500
    tool_placeholder: "[Earlier tool output removed to fit context window.]"
  skills:
    enabled: true
    dirs:
      - ".agents/skills"
      - "skills"
    inject_summary: true
    max_summary_skills: 24
    max_read_chars: 32000
    cache_ttl_seconds: 30
  error_recovery:
    enabled: true
    max_retries: 2
    backoff_base_seconds: 0.8
    retry_status_codes: [429, 502, 503, 504]
    retry_on_timeout: false
  persistence:
    enabled: true
    max_messages_per_thread: 200
    checkpoint:
      enabled: true
      backend: postgres   # postgres | memory
  observability:
    enabled: true
    persist: true
    ws_run_summary: true
    max_events_per_run: 500
    store_prompts: false
  workbench:
    translate:
      mode: chat
      prompt: |
        你是一名专业翻译。请将以下文本翻译为 {target_language}。
        保留 Markdown 格式、代码块与行内代码；只输出译文，不要解释、不要加标题。

        原文：
        {text}
      languages:
        - id: en
          label: English
          flag: "🇺🇸"
          target: English
        - id: zh-CN
          label: 简体中文
          flag: "🇨🇳"
          target: 简体中文
        - id: zh-TW
          label: 繁体中文
          flag: "🇹🇼"
          target: 繁体中文
        - id: ja
          label: 日语
          flag: "🇯🇵"
          target: 日语
        - id: ko
          label: 韩语
          flag: "🇰🇷"
          target: 韩语
        - id: fr
          label: 法语
          flag: "🇫🇷"
          target: 法语
        - id: de
          label: 德语
          flag: "🇩🇪"
          target: 德语
        - id: it
          label: 意大利语
          flag: "🇮🇹"
          target: 意大利语
  prompts:
    enabled: true
    prompts_dir: "prompts"
    native_system_file: "native_system.md"
    compat_react_preamble_file: "compat_react_preamble.md"
    plan_decision_preamble_file: "plan_decision_preamble.md"
    tool_manifest_file: "tool_manifest_suffix.md"
  coordinator:
    max_agents: 3
    max_steps_per_delegate: 5
    decompose_max_tokens: 768
    decompose_retries: 1
    parallel_delegates: true
    max_parallel_delegates: 4
    handoff_max_chars: 7000
    compress_handoff: false
    handoff_compress_max_tokens: 384
    synthesize_max_tokens: 2048
    synthesize_body_max_chars: 24000
  vision_precaption:
    enabled: false
    model_name: ""
    instruction: ""
    prefix: "【图像识别】\n"
    temperature: 0.3
    max_tokens: 1024
    max_caption_chars: 16000
    max_merged_chars: 48000
    timeout: 120
    on_failure: "keep_original"
    failure_note: ""
  context:
    enabled: true
    examples_path: ""
    top_k: 3
    min_similarity: 0.15
    use_embeddings: true
  rag:
    enabled: true
    documents_path: "data/ly_next/knowledge"
    top_k: 5
    chunk_size: 900
    chunk_overlap: 120
    min_similarity: 0.12
    use_embeddings: true
    hybrid_enabled: true
    rrf_k: 60
    mmr_enabled: false
    mmr_lambda: 0.55
    retrieve_multiplier: 3
    show_source: true
    embedding:
      model: "text-embedding-3-small"
      config_ref: "rag_embedding_llm"

tools:
  host:
    enabled: true
    roots:
      - "~"
    deny_paths: []
    max_read_bytes: 2097152
    max_write_bytes: 4194304
    max_list_entries: 500
    exec:
      enabled: true
      default_cwd: "~"
      timeout_seconds: 300
      max_output_chars: 120000
    approvals:
      enabled: true
      ttl_seconds: 600
      mode: destructive
      require_for_delete: true
      require_for_recursive_delete: true
      exec_patterns: []
  built_in:
    - "calculator"
    - "format_json"
    - "text_process"
    - "regex_extract"
    - "get_current_time"
    - "url_parse"
    - "http_fetch"
    - "web_fetch"
    - "remember_fact"
    - "list_skills"
    - "read_skill"
    - "web_search"
    - "web_scrape"
    - "generate_docx"
    - "generate_xlsx"
    - "generate_pptx"
    - "generate_image"
    - "search_images"
  # 生图: 仅 openai_compat（/images/generations，配置块见 config_ref + 下方覆盖项）
  # 搜图: tavily | bing | unsplash | pexels | pixabay | serpapi | brave | duckduckgo
  image:
    provider: "openai_compat"
    config_ref: "openai_compat_llm"
    model: "gpt-image-1"
    size: "1024x1024"
    quality: "auto"
    api_key: ""
    base_url: ""
    auth_mode: "bearer"
    auth_header_name: ""
    search_provider: "tavily"
    tavily_api_key: "${TAVILY_API_KEY:-}"
    bing_search_api_key: ""
    unsplash_access_key: ""
    pexels_api_key: ""
    pixabay_api_key: ""
    serpapi_api_key: ""
    brave_search_api_key: ""
    daily_limit: 20
    cache_ttl: 3600
    loading_text: "正在为你创作图片，稍等一下哦~"
  web_search:
    provider: "duckduckgo"
    api_key: ""
    default_num_results: 5
    cache_ttl_minutes: 15
  web_fetch:
    provider: "local"
    api_key: ""
    jina_proxy: ""
    base_url: ""
    extract_depth: "basic"
    output_format: "txt"
    favor_recall: true
    include_tables: true
    timeout_seconds: 30
    default_max_length: 8000
    max_response_bytes: 2000000
    user_agent: ""
  mcp:
    enabled: true
    transport: "sse"
    path: "/mcp"
    langgraph_tool_name_prefix: true
    remote:
      enabled: false
      mcpServers: []

database:
  host: "${DATABASE_HOST:-localhost}"
  port: 5432
  username: "postgres"
  password: "${POSTGRES_PASSWORD}"
  database: "ly_next"
  try_unix_socket: true
  pool_size: 10
  max_overflow: 20
  sql_echo: false

redis:
  host: "${REDIS_HOST:-localhost}"
  port: 6379
  password: "${REDIS_PASSWORD}"
  db: 0
  cache_ttl: 3600

services:
  stop_managed_on_exit: true

logging:
  level: "info"
  file: "logs/app.log"
  structured_file: true
  max_bytes: 10485760
  backup_count: 5

bridge:
  onebot11:
    enabled: true
    max_concurrent_replies: 8
    access_token: "${ONEBOT11_ACCESS_TOKEN:-}"
    ws_paths:
      - "/OneBotv11"
      - "/onebot/v11/ws"
    new_chat_commands:
      - "/新对话"
      - "/new"
      - "#新对话"
      - "新对话"
      - "/重置"
    help_commands:
      - "/帮助"
      - "/help"
    new_chat_reply: "已开始新对话。发送「/新对话」可清空当前上下文；此前对话仍保存在数据库中。"
    help_reply: "命令：/新对话 或 /new — 开始新对话（不继承此前聊天记录）。/帮助 — 显示本说明。"
    memory:
      max_messages: 40
      include_global_memory: false
    auto_reply:
      enabled: true
      mode: "react"
      temperature: 0.7
      max_tokens: 2048
      skip_rag: true
      skip_context: true
    triggers:
      private: true
      group: true
      group_at_only: true
      prefixes: []
      ignore_self: true
  telegram:
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN:-}"
    dm_policy: pairing
    allow_from: []
    allowed_user_ids: []
    approved_user_ids: []
    pairing:
      code_ttl_sec: 3600
      hint_cooldown_sec: 600
    poll_timeout: 30
    auto_reply:
      enabled: true
      mode: react
      temperature: 0.7
      max_tokens: 2048
      skip_rag: true
      skip_context: true

auth:
  enabled: true
  api_key: "${LY_NEXT_API_KEY}"
  header_name: "X-API-Key"
  cookie_name: "ly_api_key"
  allow_api_key_in_query: false
  cookie_secure: false
  whitelist:
    - "/docs"
    - "/openapi.json"
    - "/redoc"
    - "/api/health"
    - "/api/info"
    - "/ly/login"
    - "/ly/static/*"
    - "/onebot/v11/ws"
    - "/OneBotv11"

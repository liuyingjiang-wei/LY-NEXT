name: ly-next

services:
  redis:
    image: redis:7-alpine
    container_name: ly-next-redis
    restart: unless-stopped
    command: >-
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    ports:
      - "${REDIS_PUBLISH:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - ly-next
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:17-alpine
    container_name: ly-next-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ly_next}
    ports:
      - "${POSTGRES_PUBLISH:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ly-next
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ly_next}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  app:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ly-next:local
    container_name: ly-next-app
    restart: unless-stopped
    environment:
      LY_NEXT_NO_PROMPT: "1"
      DOCKER_CONTAINER: "1"
      LY_NEXT_PROJECT_ROOT: /app
      DATABASE_HOST: postgres
      REDIS_HOST: redis
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ly_next}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      LY_NEXT_API_KEY: ${LY_NEXT_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "${LY_NEXT_PORT:-8000}:8000"
    volumes:
      - ly-app-data:/app/data
    networks:
      - ly-next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)",
        ]
      interval: 30s
      timeout: 6s
      retries: 3
      start_period: 40s

networks:
  ly-next:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
  ly-app-data:
